<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股涨停板池</title>
    <link rel="stylesheet" href="/web_ui/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📊 今日涨停板池</h1>
            <div class="header-right">
                <span id="update-time" class="update-time">--:--:--</span>
                <button id="refresh-btn" class="btn-refresh">🔄 刷新</button>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-label">涨停总数</div>
                <div id="stat-total" class="stat-value">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">炸板数</div>
                <div id="stat-explosion" class="stat-value">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">炸板率</div>
                <div id="stat-rate" class="stat-value">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">连板股</div>
                <div id="stat-continuous" class="stat-value">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">昨涨停今表现</div>
                <div id="stat-momentum" class="stat-value momentum">--</div>
            </div>
        </div>

        <!-- Sub Stats: 昨涨停今日详情 -->
        <div class="sub-stats" id="yesterday-stats" style="display:none;">
            <div class="stat-item">
                <span class="stat-label">昨涨停:</span>
                <span id="stat-yesterday-count" class="stat-num">--</span>
            </div>
            <div class="stat-item up">
                <span class="stat-label">红盘:</span>
                <span id="stat-yesterday-up" class="stat-num">--</span>
            </div>
            <div class="stat-item down">
                <span class="stat-label">绿盘:</span>
                <span id="stat-yesterday-down" class="stat-num">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">均涨幅:</span>
                <span id="stat-yesterday-avg" class="stat-num">--</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <label>
                连板≥
                <select id="filter-continuous">
                    <option value="1">全部</option>
                    <option value="2">2连板+</option>
                    <option value="3">3连板+</option>
                    <option value="4">4连板+</option>
                </select>
            </label>
            <label>
                封板资金≥
                <select id="filter-seal">
                    <option value="0">全部</option>
                    <option value="1000">1000万</option>
                    <option value="5000">5000万</option>
                    <option value="10000">1亿</option>
                </select>
            </label>
            <label>
                板块
                <select id="filter-sector">
                    <option value="">全部</option>
                </select>
            </label>
            <input type="text" id="search-stock" placeholder="搜索股票代码/名称">
            <button id="btn-yesterday-detail" class="btn-detail">📋 昨涨停详情</button>
        </div>

        <!-- Prediction Section -->
        <div class="prediction-section" id="prediction-section" style="display:none;">
            <div class="prediction-header">
                <h2>🎯 次日涨跌预测 TOP10 (30+因子模型)</h2>
                <button id="btn-factor-detail" class="btn-factor">📊 因子详情</button>
            </div>
            <div class="prediction-list" id="prediction-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <table id="zt-table">
                <thead>
                    <tr>
                        <th data-sort="stock_code">股票代码</th>
                        <th data-sort="stock_name">股票名称</th>
                        <th data-sort="continuous_days">连板</th>
                        <th data-sort="seal_amount">封板资金</th>
                        <th data-sort="explosion_count">炸板</th>
                        <th data-sort="super_net_inflow">超大单</th>
                        <th data-sort="big_net_inflow">大单</th>
                        <th data-sort="sector">板块</th>
                        <th>预测</th>
                    </tr>
                </thead>
                <tbody id="zt-tbody">
                    <tr><td colspan="9" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 昨涨停详情弹窗 -->
    <div id="yesterday-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 昨涨停股今日表现</h2>
                <span id="modal-close" class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 绿盘股 -->
                <div class="stock-section" id="section-down">
                    <h3 class="section-title down">🔴 绿盘股 (下跌)</h3>
                    <div class="stock-list" id="list-down">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                <!-- 红盘股 -->
                <div class="stock-section" id="section-up">
                    <h3 class="section-title up">🟢 红盘股 (上涨)</h3>
                    <div class="stock-list" id="list-up">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                <!-- 平盘股 -->
                <div class="stock-section" id="section-flat">
                    <h3 class="section-title flat">⚪ 平盘股</h3>
                    <div class="stock-list" id="list-flat">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 因子详情弹窗 -->
    <div id="factor-modal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>📊 预测因子详情</h2>
                <span id="factor-modal-close" class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div id="factor-stock-info" class="factor-stock-info"></div>
                <div id="factor-categories" class="factor-categories">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/web_ui/app.js"></script>
</body>
</html>
